name: Deploy API to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - "api_server.py"
      - "gemini_transcribe_v2.py"
      - "gcs_upload.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy-api.yml"

env:
  PROJECT_ID: giji-minutes
  REGION: asia-northeast1
  SERVICE: giji-api
  BUCKET: giji-uploads-minutes

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Apply GCS CORS policy
        run: |
          cat > /tmp/cors.json << 'EOF'
          [{"origin":["https://giji-minutes.web.app","https://minutes.jittee.com","http://localhost:3000"],"method":["GET","POST","PUT","DELETE","OPTIONS"],"responseHeader":["Content-Type","Content-Length","Content-Range","Range","X-GUploader-UploadID","X-Upload-Content-Type","Location","ETag"],"maxAgeSeconds":3600}]
          EOF
          gcloud storage buckets update gs://${{ env.BUCKET }} --cors-file=/tmp/cors.json --project=${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source=. \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600 \
            --concurrency=10 \
            --port=8000 \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
            --set-env-vars="STRIPE_PRICE_JPY=500,GCS_BUCKET=${{ env.BUCKET }},ALLOWED_ORIGINS=https://giji-minutes.web.app,https://minutes.jittee.com"
