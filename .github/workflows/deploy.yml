# このワークフローはStreamlit版で使用していました。
# Next.js + FastAPI移行後は deploy-api.yml を使用してください。
name: Deploy to Cloud Run (旧Streamlit版・無効)

on:
  workflow_dispatch:  # 手動実行のみ（自動デプロイ無効）

env:
  PROJECT_ID: geminipoc-486608
  REGION: asia-northeast1
  SERVICE: giji

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source=. \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --timeout=3600 \
            --port=8080 \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_PUBLISHABLE_KEY=STRIPE_PUBLISHABLE_KEY:latest" \
            --set-env-vars="STRIPE_PRICE_JPY=500,GCS_BUCKET=giji-uploads-geminipoc"
