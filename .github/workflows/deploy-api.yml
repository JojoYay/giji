name: Deploy API to Cloud Run

on:
  push:
    branches: [master]
    paths:
      - "api_server.py"
      - "gemini_transcribe_v2.py"
      - "gcs_upload.py"
      - "requirements.txt"
      - "Dockerfile.api"
      - ".github/workflows/deploy-api.yml"

env:
  PROJECT_ID: geminipoc-486608
  REGION: asia-northeast1
  SERVICE: giji-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --source=. \
            --project=${{ env.PROJECT_ID }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --allow-unauthenticated \
            --memory=2Gi \
            --cpu=2 \
            --timeout=3600 \
            --concurrency=10 \
            --port=8000 \
            --set-secrets="GEMINI_API_KEY=GEMINI_API_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest" \
            --set-env-vars="STRIPE_PRICE_JPY=500,GCS_BUCKET=giji-uploads-geminipoc,ALLOWED_ORIGINS=https://giji-frontend.vercel.app"
